<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot</title>

    <style>
        body{
    margin:0;
    font-family:Arial;
    background:#f4f4f4;
}

.main{
    width:80%;
    margin:auto;
    padding:40px;
}

.top{
    background:green;
    color:white;
    padding:30px;
    border-radius:10px;
}

.cards{
    display:flex;
    gap:20px;
    margin-top:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    flex:1;
}

.chatBtn{
    position:fixed;
    right:20px;
    bottom:20px;
    padding:15px;
    border:none;
    background:orange;
    color:white;
    border-radius:50px;
    cursor:pointer;
}

.chat{
    width:350px;
    background:white;
    position:fixed;
    right:20px;
    bottom:80px;
    border-radius:10px;
    display:none;
    overflow:hidden;
}

.show{
    display:block;
}

.head{
    background:green;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
}

.head button{
    border:none;
    background:white;
    cursor:pointer;
}

.box{
    height:250px;
    overflow-y:auto;
    padding:10px;
    background:#f0f0f0;
}

.bot{
    background:#d4ffd4;
    padding:10px;
    margin:5px;
    border-radius:10px;
    width:fit-content;
}

.user{
    background:#ffe0b3;
    padding:10px;
    margin:5px;
    border-radius:10px;
    width:fit-content;
    margin-left:auto;
}

.quick{
    padding:10px;
}

.quick button{
    margin:5px;
    padding:8px;
}

.input{
    display:flex;
    padding:10px;
}

.input input{
    flex:1;
    padding:10px;
}

.input button{
    padding:10px;
    background:green;
    color:white;
    border:none;
}      
    </style>
</head>

<body>

    <div class="main">
        <div class="top">
            <h1>FreshMart Grocery Store</h1>
            <p>
                We provide grocery items and home delivery service
            </p>
        </div>
        <div class="cards">
            <div class="card">
                <h2>Fresh Items</h2>
                <p>Fresh products from farmers</p>
            </div>
            <div class="card">
                <h2>Home Delivery</h2>
                <p>Fast delivery service</p>
            </div>
            <div class="card">
                <h2>Low Price</h2>
                <p>Products at lower price</p>
            </div>

        </div>
    </div>

    <button id="chatBtn" class="chatBtn" onclick="openChat()">
        Chat
    </button>

    <div class="chat" id="chat">
        <div class="head">
            <h3>Assistant</h3>

            <button onclick="openChat()">X</button>

        </div>

        <div class="box" id="box">

            <div class="bot">
                Hello! How can I help you?
            </div>

        </div>

        <div class="quick">

            <button onclick="quickMsg('delivery')">Delivery</button>

            <button onclick="quickMsg('return')">Return</button>

            <button onclick="quickMsg('contact')">Contact</button>

        </div>

        <div class="input">

            <input type="text" id="msg" placeholder="Type message">
            <button onclick="sendMsg()">Send</button>

        </div>

    </div>

    <script>
      const chat = document.getElementById("chat");
const box = document.getElementById("box");
const msg = document.getElementById("msg");

function openChat() {
    chat.classList.toggle("show");
}

function addMsg(type, text) {

    box.innerHTML += `
        <div class="${type}">
            ${text}
        </div>
    `;

    box.scrollTop = box.scrollHeight;
}

function botReply(text) {

    if (text.toLowerCase().includes("hello") || text.toLowerCase().includes("hi")) {
        return "Hello! Welcome to FreshMart";
    }

    if (
        text.includes("delivery")
    ) {
        return "Delivery takes 24 hours";
    }

    if (
        text.includes("return")
    ) {
        return "Return accepted within 3 days";
    }

    if (
        text.includes("contact")
    ) {
        return "Call us on 9876543210";
    }

    if (
        text.includes("order")
    ) {
        return "Track order in My Orders";
    }

    return "Please ask about delivery, return or contact";
}

function sendMsg() {

    let text = msg.value.trim();

    if (text == "") {
        return;
    }

    addMsg("user", text);

    msg.value = "";

    setTimeout(() => {

        addMsg("bot", botReply(text.toLowerCase()));

    }, 500);
}

function quickMsg(text) {

    msg.value = text;

    sendMsg();
}

msg.addEventListener("keydown", function(event) {

    if (event.key === "Enter") {

        sendMsg();
    }

});
      
    </script>

</body>
</html>
