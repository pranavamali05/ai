<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot</title>

    <link rel="stylesheet" href="chat_style.css">
</head>

<body>

    <div class="main">
        <div class="top">
            <h1>FreshMart Grocery Store</h1>
            <p>
                We provide grocery items and home delivery service
            </p>
        </div>
        <div class="cards">
            <div class="card">
                <h2>Fresh Items</h2>
                <p>Fresh products from farmers</p>
            </div>
            <div class="card">
                <h2>Home Delivery</h2>
                <p>Fast delivery service</p>
            </div>
            <div class="card">
                <h2>Low Price</h2>
                <p>Products at lower price</p>
            </div>

        </div>
    </div>

    <button id="chatBtn" class="chatBtn" onclick="openChat()">
        Chat
    </button>

    <div class="chat" id="chat">
        <div class="head">
            <h3>Assistant</h3>

            <button onclick="openChat()">X</button>

        </div>

        <div class="box" id="box">

            <div class="bot">
                Hello! How can I help you?
            </div>

        </div>

        <div class="quick">

            <button onclick="quickMsg('delivery')">Delivery</button>

            <button onclick="quickMsg('return')">Return</button>

            <button onclick="quickMsg('contact')">Contact</button>

        </div>

        <div class="input">

            <input type="text" id="msg" placeholder="Type message">
            <button onclick="sendMsg()">Send</button>

        </div>

    </div>

    <script src="chat_script.js"></script>

</body>
</html>
